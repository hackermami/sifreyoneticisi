name: Webnetik BlindSight Custom Gradle CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Custom Gradle Version Compile
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Custom Gradle from Specific URL
      uses: gradle/actions/setup-gradle@v3
      with:
        # Belirttiğin özel dağıtım linkini sisteme zorla entegre ediyoruz
        gradle-version: https://services.gradle.org/distributions/gradle-9.6.0-bin.zip

    - name: Unzip Project File Automatically
      run: |
        echo "Depodaki zip dosyası aranıyor..."
        ZIP_FILE=$(find . -name "*.zip" | head -n 1)
        
        if [ -z "$ZIP_FILE" ]; then
          echo "HATA: Depoda hiçbir .zip dosyası bulunamadı!"
          exit 1
        fi
        
        echo "Bulunan zip dosyası dışarı çıkartılıyor: $ZIP_FILE"
        unzip -q "$ZIP_FILE" -d extracted_project
        echo "Zip başarıyla ayıklandı."

    - name: Locate Project and Build APK
      run: |
        SETTINGS_PATH=$(find extracted_project -name settings.gradle.kts -o -name settings.gradle | head -n 1)
        
        if [ -z "$SETTINGS_PATH" ]; then
          echo "HATA: Ayıklanan zip içeriğinde settings.gradle.kts bulunamadı!"
          exit 1
        fi
        
        PROJ_DIR=$(dirname "$SETTINGS_PATH")
        echo "Android projesi bulundu: $PROJ_DIR"
        cd "$PROJ_DIR"
        
        # Hafıza kısıtlamalarını ve güvenlik çakışmalarını ezen parametreler
        export GRADLE_OPTS="-Xmx4096m -Djdk.crypto.KeyAgreement.legacyKDF=true"
        gradle assembleDebug --no-daemon --no-configuration-cache

    - name: Upload BlindSight Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-v1.0-debug
        path: |
          **/build/outputs/apk/debug/*.apk
        retention-days: 7
