name: Webnetik BlindSight Complete CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Locate and Compile Android Project
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Locate Project and Build APK
      run: |
        # settings.gradle.kts veya settings.gradle içeren tam dizini buluyoruz
        SETTINGS_PATH=$(find . -name settings.gradle.kts -o -name settings.gradle | head -n 1)
        
        if [ -z "$SETTINGS_PATH" ]; then
          echo "HATA: Depoda hiçbir Android projesi yapısı (settings.gradle.kts) bulunamadı!"
          echo "Lütfen ZArchiver'da gördüğün tüm dosyaları (.gitignore, build.gradle.kts vb.) git add . ile pushladığından emin ol."
          exit 1
        fi
        
        PROJ_DIR=$(dirname "$SETTINGS_PATH")
        echo "Android projesi bulundu: $PROJ_DIR"
        cd "$PROJ_DIR"
        
        # Ekran görüntüsündeki gibi root dizinde gradlew yoksa global gradle ile build alıyoruz
        gradle assembleDebug --no-daemon

    - name: Upload BlindSight Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-v1.0-debug
        path: |
          **/build/outputs/apk/debug/*.apk
        retention- days: 7
