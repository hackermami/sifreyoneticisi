name: Webnetik BlindSight CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compiling BlindSight V1.0 Core
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        # Hata veren otomatik önbelleği kapatıyoruz, manuel veya bağımsız yönetim sağlayacağız
        cache: ''

    - name: Grant Execute Permission for Gradle
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x gradlew
        else
          echo "Kök dizinde gradlew bulunamadı, alt klasörler kontrol ediliyor..."
          find . -name gradlew -exec chmod +x {} \;
        fi

    - name: Build Debug APK (Offline Edge-AI Optimize)
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug --no-daemon
        else
          # Eğer proje bir alt klasörün içine açıldıysa onu bulup orada derliyoruz
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "HATA: Projede gradlew dosyası hiçbir yerde bulunamadı!"
            exit 1
          fi
          PROJ_DIR=$(dirname "$GRADLEW_PATH")
          cd "$PROJ_DIR"
          ./gradlew assembleDebug --no-daemon
        fi

    - name: Upload BlindSight Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-v1.0-debug
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
        retention-days: 7
