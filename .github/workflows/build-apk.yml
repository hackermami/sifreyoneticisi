name: Password Manager APK Yap

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      # Gradle 9.3.1 ve üzeri için Java 21 kurulumu yapıyoruz
      - name: Java Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Hata veren Gradle sürümünü projenin istediği gibi 9.3.1'e yükselttik
      - name: Gradle Kurulumu (Sistem Geneli)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # Zip dosyası varsa açma kontrolü
      - name: Zip Kontrolu ve Acma
        run: |
          if [ -f "webnetik-vault.zip" ]; then
            echo "Zip dosyası bulundu, açılıyor..."
            unzip -o webnetik-vault.zip -d .
          elif [ -f "webnetik_vault.zip" ]; then
            echo "Alternatif isimli zip bulundu, açılıyor..."
            unzip -o webnetik_vault.zip -d .
          fi

      - name: Debug Keystore Olustur
        run: |
          keytool -genkey -v -keystore ./debug.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias androiddebugkey -storepass android -keypass android -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
      
      - name: APK Olustur (Build)
        run: |
          GRADLE_DIR=$(find . -name "build.gradle*" -exec dirname {} \;)
          
          if [ -f "$GRADLE_DIR/settings.gradle" ] || [ -f "$GRADLE_DIR/settings.gradle.kts" ]; then
            cd $GRADLE_DIR
          elif [ -f "$GRADLE_DIR/../settings.gradle" ] || [ -f "$GRADLE_DIR/../settings.gradle.kts" ]; then
            cd $GRADLE_DIR/..
          fi
          
          echo "Derleme baslatiliyor. Konum: $(pwd)"
          gradle assembleDebug
        env:
          JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
      
      - name: APK'yi Cikti Olarak Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: webnetik-pass-apk
          path: "**/build/outputs/apk/debug/*.apk"
