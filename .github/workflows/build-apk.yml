name: Webnetik BlindSight CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    # Büyük Yapay Zeka Modelini (150MB+) Derlemeden Önce İndiriyoruz
    # Not: Model dosyasını git reposuna yüklemek yerine derleme anında çekmek en profesyonel yöntemdir.
    - name: Download Edge AI Model (MediaPipe Face Detection)
      run: |
        mkdir -p app/src/main/assets
        curl -L -o app/src/main/assets/face_detection_full.tflite https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite

    - name: Build Production APK
      run: ./gradlew assembleRelease

    # Oluşan Kurumsal Boyuttaki APK'yı İndirilebilir Dosya Olarak Yüklüyoruz
    - name: Upload Webnetik BlindSight APK
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
