name: Webnetik BlindSight CI/CD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    # ADIM 1: Repodaki webnetik-blindsight.zip dosyasını dışarı çıkarır
    - name: Extract Zip Files Automatically
      run: |
        ZIP_FILE=$(find . -name "*.zip" | head -n 1)
        if [ -n "$ZIP_FILE" ]; then
          echo "Zip dosyası bulundu: $ZIP_FILE. Dışarı aktarılıyor..."
          unzip -o "$ZIP_FILE" -d ./extracted_project
          cp -r ./extracted_project/* ./ 2>/dev/null || true
        else
          echo "Doğrudan kod klasörleri algılandı, zip bulunamadı."
        fi

    # ADIM 2: settings.gradle dosyasını arar ve eksik sistem dosyalarını (Hata Veren .env Dahil) üretir
    - name: Find Project Root and Fix Environment
      run: |
        # Broken pipe hatasını engellemek için daha temiz bir arama metodu kullanıyoruz
        SETTINGS_DIR="."
        if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
          SETTINGS_DIR="."
        else
          FOUND_DIR=$(find . -name "settings.gradle*" -print -quit | xargs -I {} dirname {})
          if [ -n "$FOUND_DIR" ]; then
            SETTINGS_DIR="$FOUND_DIR"
          fi
        fi
        
        cd "$SETTINGS_DIR"
        
        # Hatanın ana sebebi olan eksik .env.example dosyasını burada otomatik oluşturuyoruz!
        echo "Eksik .env.example dosyası sunucuda simüle ediliyor..."
        echo "API_KEY=webnetik_dummy_key" > .env.example
        echo "BASE_URL=https://webnetik.security" >> .env.example

        # settings.gradle hiç yoksa sıfırdan üret
        if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
          echo "rootProject.name = 'Webnetik-BlindSight'" > settings.gradle.kts
          echo "include(':app')" >> settings.gradle.kts
        fi
        
        # Gradle Wrapper (gradlew) kontrolü ve sıfırdan üretilmesi
        if [ ! -f "gradlew" ]; then
          echo "gradlew bulunamadı, yerel gradle sunucuda kuruluyor..."
          gradle wrapper
        fi
        chmod +x gradlew
        echo "PROJECT_ROOT=$SETTINGS_DIR" >> $GITHUB_ENV

    # ADIM 3: 150 MB+ boyutundaki kurumsal MediaPipe Yapay Zeka Modelini indirir
    - name: Download Edge AI Model (MediaPipe Face Detection)
      run: |
        cd ${{ env.PROJECT_ROOT }}
        mkdir -p app/src/main/assets
        curl -L -o app/src/main/assets/face_detection_full.tflite https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite

    # ADIM 4: APK Derleme İşlemini Başlatır
    - name: Build Production APK
      run: |
        cd ${{ env.PROJECT_ROOT }}
        ./gradlew assembleDebug

    # ADIM 5: Derlenen Webnetik BlindSight APK dosyasını sisteme yükler
    - name: Upload Webnetik BlindSight APK
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-apk
        path: "**/build/outputs/apk/de bug/*.apk"
