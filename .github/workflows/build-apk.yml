name: Webnetik BlindSight Manual CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Auto-Generate Gradle and Compile APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle Environment Manually
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2 # Android 10+ ve targetSdk 34 için en kararlı Gradle sürümü

    - name: Build Debug APK via Manual Gradle
      run: |
        # Eğer proje bir alt klasörün içerisindeyse o klasöre geçiş yapıyoruz
        GRADLE_BUILD_PATH=$(find . -name build.gradle -o -name build.gradle.kts | head -n 1)
        if [ -z "$GRADLE_BUILD_PATH" ]; then
          echo "HATA: Projede build.gradle dosyası hiçbir yerde bulunamadı!"
          exit 1
        fi
        PROJ_DIR=$(dirname "$GRADLE_BUILD_PATH")
        cd "$PROJ_DIR"
        
        # Yerel gradlew dosyası yoksa, yüklü olan global gradle komutuyla derlemeyi başlatıyoruz
        gradle assembleDebug --no-daemon

    - name: Upload BlindSight Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-v1.0-debug
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
        retention-d ays: 7
