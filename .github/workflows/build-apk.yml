name: Webnetik BlindSight CI/CD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    # ADIM 1: Zip dosyasını dışarı çıkarır
    - name: Extract Zip Files Automatically
      run: |
        ZIP_FILE=$(find . -name "webnetik-blindsight (2).zip" | head -n 1)
        if [ -n "$ZIP_FILE" ]; then
          echo "Güncel zip dosyası bulundu: $ZIP_FILE. Dışarı aktarılıyor..."
          unzip -o "$ZIP_FILE" -d ./extracted_project
          cp -r ./extracted_project/* ./ 2>/dev/null || true
        else
          echo "HATA: webnetik-blindsight (2).zip dosyası repoda bulunamadı!"
          exit 1
        fi

    # ADIM 2: Çevre, İmza, Paket ve Modül Yapılandırmasını Kökten Düzeltir
    - name: Find Project Root and Fix Environment
      run: |
        SETTINGS_DIR="."
        FOUND_DIR=$(find . -name "settings.gradle*" -print -quit | xargs -I {} dirname {})
        if [ -n "$FOUND_DIR" ]; then
          SETTINGS_DIR="$FOUND_DIR"
        fi
        
        cd "$SETTINGS_DIR"
        
        echo "API_KEY=webnetik_dummy_key" > .env.example
        echo "BASE_URL=https://webnetik.security" >> .env.example

        echo "Sistem imza anahtarı (debug.keystore) sunucuda oluşturuluyor..."
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

        # KOTLIN GRADLE (kts) İÇİN ÇİFT TIRNAK HATASI BURADA DÜZELTİLDİ!
        echo 'rootProject.name = "My Application"' > settings.gradle.kts
        
        REAL_APP_DIR=$(find . -maxdepth 2 -name "build.gradle*" -not -path "./build.gradle*" -not -path "./extracted_project/*" -print -quit | xargs -I {} dirname {} | sed 's|./||')
        if [ -n "$REAL_APP_DIR" ] && [ "$REAL_APP_DIR" != "." ] && [ "$REAL_APP_DIR" != "extracted_project" ]; then
          echo "include(\":$REAL_APP_DIR\")" >> settings.gradle.kts
          echo "MODULE_NAME=$REAL_APP_DIR" >> $GITHUB_ENV
          mkdir -p "$REAL_APP_DIR"
          echo '{"project_info":{"project_number":"123456789","project_id":"webnetik-blindsight"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456:android:123","android_client_info":{"package_name":"com.aistudio.blindsight.webnetik"}},"api_key":[{"current_key":"dummy_key"}]}]}' > "$REAL_APP_DIR/google-services.json"
        else
          echo 'include(":app")' >> settings.gradle.kts
          echo "MODULE_NAME=app" >> $GITHUB_ENV
          mkdir -p app
          echo '{"project_info":{"project_number":"123456789","project_id":"webnetik-blindsight"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456:android:123","android_client_info":{"package_name":"com.aistudio.blindsight.webnetik"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json
        fi

        TARGET_ASSETS_DIR="${REAL_APP_DIR:-app}/src/main/assets"
        mkdir -p "$TARGET_ASSETS_DIR"
        echo "TARGET_ASSETS=$TARGET_ASSETS_DIR" >> $GITHUB_ENV
        
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        echo "PROJECT_ROOT=$SETTINGS_DIR" >> $GITHUB_ENV

    # ADIM 3: Yapay Zeka Modelini Doğru Konuma İndirir
    - name: Download Edge AI Model (MediaPipe Face Detection)
      run: |
        cd ${{ env.PROJECT_ROOT }}
        curl -L -o ${{ env.TARGET_ASSETS }}/face_detection_full.tflite https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite

    # ADIM 4: APK Derleme İşlemini Başlatır
    - name: Build Production APK
      run: |
        cd ${{ env.PROJECT_ROOT }}
        ./gradlew assembleDebug

    # ADIM 5: APK Dosyasını Nerede Olursa Olsun Bulur ve Ana Dizine Çeker
    - name: Locate and Collect APK File
      run: |
        mkdir -p ./apk_output
        echo "Üretilen APK dosyaları sunucu diskinde aranıyor..."
        find . -name "*.apk" -not -path "*/build-cache/*" -exec cp {} ./apk_output/ \;
        echo "Bulunan APK dosyaları:"
        ls -la ./apk_output/

    # ADIM 6: Çıktı Klasörünü Panele Yükler
    - name: Upload Webnetik BlindSight APK
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-apk
        path: ./apk_output/*.apk
