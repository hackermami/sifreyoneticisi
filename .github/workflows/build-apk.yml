name: Webnetik BlindSight Complete CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Unzip and Compile BlindSight
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.7 # Motor sürümü yükseltildi, takılma hatası çözüldü.

    - name: Unzip Project File Automatically
      run: |
        echo "Depodaki zip dosyası aranıyor..."
        ZIP_FILE=$(find . -name "*.zip" | head -n 1)
        
        if [ -z "$ZIP_FILE" ]; then
          echo "HATA: Depoda hiçbir .zip dosyası bulunamadı!"
          exit 1
        fi
        
        echo "Bulunan zip dosyası dışarı çıkartılıyor: $ZIP_FILE"
        unzip -q "$ZIP_FILE" -d extracted_project
        echo "Zip başarıyla ayıklandı."

    - name: Locate Project and Build APK
      run: |
        SETTINGS_PATH=$(find extracted_project -name settings.gradle.kts -o -name settings.gradle | head -n 1)
        
        if [ -z "$SETTINGS_PATH" ]; then
          echo "HATA: Ayıklanan zip içeriğinde settings.gradle.kts bulunamadı!"
          exit 1
        fi
        
        PROJ_DIR=$(dirname "$SETTINGS_PATH")
        echo "Android projesi bulundu: $PROJ_DIR"
        cd "$PROJ_DIR"
        
        # Hafıza sınırı artırıldı ve tüm bağımlılıkların temiz kurulması zorunlu kılındı.
        export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m"
        gradle assembleDebug --no-daemon --refresh-dependencies --no-configuration-cache
        
    - name: Upload BlindSight Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-v1.0-debug
        path: |
          **/build/outputs/apk/debug/*.apk
        retention- days: 7
