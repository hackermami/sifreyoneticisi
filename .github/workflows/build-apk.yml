name: Webnetik BlindSight CI/CD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    # Eğer dosyalar bir alt klasördeyse veya zip içindeyse diye projenin kök dizinini buluyoruz
    - name: Find Project Root and Setup Wrapper
      run: |
        SETTINGS_DIR=$(find . -name "settings.gradle*" -exec dirname {} \; | head -n 1)
        if [ -n "$SETTINGS_DIR" ]; then
          echo "Proje kök dizini bulundu: $SETTINGS_DIR"
          cd "$SETTINGS_DIR"
          # Gradle çalıştırma iznini veriyoruz
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          fi
        else
          echo "HATA: settings.gradle dosyası repoda hiçbir yerde bulunamadı!"
          exit 1
        fi
        echo "PROJECT_ROOT=$SETTINGS_DIR" >> $GITHUB_ENV

    # Büyük Yapay Zeka Modelini (150MB+) Doğru Klasöre İndiriyoruz
    - name: Download Edge AI Model (MediaPipe Face Detection)
      run: |
        cd ${{ env.PROJECT_ROOT }}
        mkdir -p app/src/main/assets
        curl -L -o app/src/main/assets/face_detection_full.tflite https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite

    # Derleme işlemini projenin kurulu olduğu klasörde tetikliyoruz
    - name: Build Production APK
      run: |
        cd ${{ env.PROJECT_ROOT }}
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        else
          gradle assembleDebug
        fi

    # Oluşan APK'yı GitHub Paneline Yüklüyoruz
    - name: Upload Webnetik BlindSight APK
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-apk
        path: "**/build/outputs/apk/debu g/*.apk"
