name: Password Manager APK Yap

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: Java Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle Kurulumu (Sistem Geneli)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Zip Kontrolu ve Acma
        # Parantezli ve riskli isimleri güvenli bir şekilde açmak için tırnak içine alıyoruz
        run: |
          if [ -f "webnetik-vault(1).zip" ]; then
            echo "Parantez isimli zip bulundu, açılıyor..."
            unzip -o "webnetik-vault(1).zip" -d .
          elif [ -f "webnetik-vault.zip" ]; then
            echo "Normal zip bulundu, açılıyor..."
            unzip -o webnetik-vault.zip -d .
          elif [ -f "webnetik-pass-apk.zip" ]; then
            echo "Alternatif zip bulundu, açılıyor..."
            unzip -o webnetik-pass-apk.zip -d .
          else
            echo "Doğrudan klasörler kontrol ediliyor..."
          fi

      - name: Debug Keystore Olustur
        run: |
          keytool -genkey -v -keystore ./debug.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias androiddebugkey -storepass android -keypass android -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
      
      - name: APK Olustur (Build)
        run: |
          # settings.gradle veya settings.gradle.kts dosyasını bulur
          SETTINGS_DIR=$(find . -name "settings.gradle*" -exec dirname {} \; | head -n 1)
          
          if [ -n "$SETTINGS_DIR" ]; then
            echo "Proje kök dizini bulundu: $SETTINGS_DIR"
            cd "$SETTINGS_DIR"
          else
            echo "HATA: settings.gradle dosyası hiçbir yerde bulunamadı!"
            echo "=== Mevcut Dosya Yapısı ==="
            ls -R
            exit 1
          fi
          
          echo "Derleme başlatılıyor. Şu anki Konum: $(pwd)"
          gradle assembleDebug
        env:
          JAVA_TOOL_OPTIONS: -Djava.awt.headless=true
      
      - name: APK'yi Cikti Olarak Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: webnetik-pass-apk
          path: "**/build/outputs/apk/debug/ *.apk"
