name: Webnetik BlindSight CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compiling BlindSight V1.0 Core
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Debug APK (Offline Edge-AI Optimize)
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload BlindSight Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webnetik-blindsight-v1.0-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention- days: 7
